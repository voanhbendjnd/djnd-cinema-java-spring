<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" lang="en">

<head>
    <title th:text="#{email.activation.title}">Cinema creation</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="icon" th:href="@{|${baseUrl}/favicon.ico|}" />
</head>

<body>
    <p th:text="#{email.activation.greeting(${user.login})}">Dear</p>
    <p th:text="#{email.creation.text1}">Your Cinema account email already change, please click on the URL below to
        access
        it:</p>
    <p>
        <a th:with="url=(@{|${baseUrl}/account/reset/finish?key=${user.resetKey}|})" th:href="${url}"
            th:text="${url}">Login link</a>
    </p>
    <p>
        <span th:text="#{email.activation.text2}">Regards, </span>
        <br />
        <em th:text="#{email.signature}">Cinema.</em>
    </p>
</body>

</html>
